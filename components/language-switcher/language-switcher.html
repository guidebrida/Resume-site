<!-- Language & Theme Switcher Component -->
<div class="language-switcher">
    <button class="menu-toggle" id="menu-toggle-btn" aria-label="Open language and theme menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div class="language-menu">
        <div class="menu-section">
            <h4 data-i18n="menu.theme">Theme</h4>
            <div class="theme-options">
                <button class="theme-option active" data-theme="light" aria-label="Switch to light theme">
                    <span class="icon">☀️</span> <span data-i18n="menu.light">Light</span>
                </button>
                <button class="theme-option" data-theme="dark" aria-label="Switch to dark theme">
                    <span class="icon">🌙</span> <span data-i18n="menu.dark">Dark</span>
                </button>
            </div>
        </div>

        <div class="menu-divider"></div>

        <div class="menu-section">
            <h4 data-i18n="menu.language">Language</h4>
            <div class="lang-options">
                <button class="lang-btn active" data-lang="en" aria-label="Switch to English">
                    <span class="flag">🇺🇸</span> English
                </button>
                <button class="lang-btn" data-lang="pt" aria-label="Switch to Portuguese">
                    <span class="flag">🇧🇷</span> Português
                </button>
            </div>
        </div>
    </div>
</div>
